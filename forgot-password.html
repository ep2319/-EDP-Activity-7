<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore IS - Recover Password</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="glass-panel auth-card">
      <div class="auth-header">
        <h1>Recover Access</h1>
        <p>Enter your email to receive recovery instructions.</p>
      </div>
      <form action="index.html" method="GET">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="admin@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-bottom: 1rem;">Send Recovery Link <i data-lucide="mail" style="width: 18px; margin-left: 8px;"></i></button>
        <div class="text-center text-sm" style="text-align: center;">
          <a href="index.html" style="display: inline-flex; align-items: center; gap: 0.25rem;"><i data-lucide="arrow-left" style="width: 14px;"></i> Back to Login</a>
        </div>
      </form>
    </div>
  </div>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
